name: Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      # No install step: package.json has zero deps and no lockfile.
      # `npm test` invokes `node --test` which uses the built-in node:test.
      - name: Run node:test suite
        run: npm test
